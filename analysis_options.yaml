# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat unused imports and variables as errors so dart fix --apply removes them
    unused_import: error
    unused_local_variable: warning
    dead_code: warning
    # Enforce consistent import ordering
    directives_ordering: warning
    # Catch missing return types
    always_declare_return_types: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"
    - build/**

linter:
  rules:
    # --- Code style ---
    prefer_single_quotes: true
    always_declare_return_types: true
    directives_ordering: true
    sort_constructors_first: true
    prefer_relative_imports: true

    # --- Avoiding pitfalls ---
    avoid_print: true
    avoid_empty_else: true
    avoid_relative_lib_imports: false   # prefer_relative_imports supercedes this
    avoid_types_as_parameter_names: true
    avoid_unused_constructor_parameters: true
    no_duplicate_case_values: true
    no_logic_in_create_state: true
    use_build_context_synchronously: true

    # --- Performance / Flutter best practices ---
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    sized_box_for_whitespace: true
    use_colored_box: true
    use_decorated_box: true
    use_super_parameters: true

    # --- Null safety / correctness ---
    cast_nullable_to_non_nullable: true
    unnecessary_nullable_for_final_variable_declarations: true
    unnecessary_null_checks: true

    # --- Dead code / cleanup ---
    unnecessary_await_in_return: true
    unnecessary_raw_strings: true
    unnecessary_string_escapes: true
    unnecessary_string_interpolations: true
    unnecessary_this: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
